[platformio]
default_envs = esp32s3_supermini

[env:esp32s3_supermini]
; ESP32-S3 SuperMini (DWEII / generic clone) — confirmed working in ESP32-S3_Test project.
; Chip: ESP32S3FH4R2 — 4 MB flash, 2 MB PSRAM, native USB-C (no UART bridge).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = boards/partitions_4mb.csv   ; custom layout — do NOT swap; default causes boot loops

; Source selection: shared core + this device's layer.
; Future ANBRU-430 env will use +<core/> +<anbru430/>.
build_src_filter = +<core/> +<oled/>

monitor_speed = 115200
monitor_port = /dev/cu.usb*
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
; Full system reset after flash so boot straps are re-sampled — a plain core
; reset over USB-Serial/JTAG leaves the chip stuck in download mode.
board_upload.after_reset = watchdog_reset

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DU8G2_WITHOUT_CLIP_WINDOW_SUPPORT
    -DU8G2_WITHOUT_FONT_ROTATION
    -DU8G2_WITHOUT_UNICODE
    -Iinclude/core
    -Iinclude/oled

lib_deps =
    olikraus/U8g2@^2.36.0

[env:esp32s3_supermini_release]
extends = env:esp32s3_supermini
build_flags =
    ${env:esp32s3_supermini.build_flags}
    -DRELEASE_BUILD=1

[env:esp32s3_dev]
extends = env:esp32s3_supermini
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
build_flags =
    ${env:esp32s3_supermini.build_flags}
    -DDEV_BUILD=1

[env:anbru430]
; ANBRU-430 — Waveshare ESP32-S3-Touch-LCD-4.3B-BOX
; ESP32-S3-WROOM-1-N16R8: 16 MB flash (QIO), 8 MB octal PSRAM (qio_opi is mandatory).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = boards/partitions_16mb.csv

monitor_speed = 115200
monitor_port = /dev/cu.usb*
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
board_upload.after_reset = watchdog_reset

build_src_filter = +<core/> +<anbru430/>

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_STDLIB_MALLOC=1
    -DLV_DEF_REFR_PERIOD=16
    -Iinclude/core
    -Iinclude/anbru430

lib_deps =
    lvgl/lvgl@^9.3.0
