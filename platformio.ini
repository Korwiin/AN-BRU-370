[env:lolin_s3_mini]
; NOTE: verify this board field matches the DWEII Super Mini variant.
; lolin_s3_mini is the closest standard match (4MB flash, native USB).
; If upload fails, try: esp32-s3-devkitc-1
platform = espressif32
board = lolin_s3_mini
framework = arduino

board_build.f_cpu = 240000000L

monitor_speed = 115200
monitor_port = /dev/cu.usb*
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DU8G2_WITHOUT_CLIP_WINDOW_SUPPORT
    -DU8G2_WITHOUT_FONT_ROTATION
    -DU8G2_WITHOUT_UNICODE

lib_deps =
    olikraus/U8g2@^2.36.0
