[platformio]
default_envs = esp32s3_supermini

[env:esp32s3_supermini]
; ESP32-S3 SuperMini (DWEII / generic clone) — confirmed working in ESP32-S3_Test project.
; Chip: ESP32S3FH4R2 — 4 MB flash, 2 MB PSRAM, native USB-C (no UART bridge).
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv   ; custom layout — do NOT swap; default causes boot loops

monitor_speed = 115200
monitor_port = /dev/cu.usb*
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
; Full system reset after flash so boot straps are re-sampled — a plain core
; reset over USB-Serial/JTAG leaves the chip stuck in download mode.
board_upload.after_reset = watchdog_reset

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DU8G2_WITHOUT_CLIP_WINDOW_SUPPORT
    -DU8G2_WITHOUT_FONT_ROTATION
    -DU8G2_WITHOUT_UNICODE

lib_deps =
    olikraus/U8g2@^2.36.0
    h2zero/NimBLE-Arduino@^1.4.0

[env:esp32s3_supermini_release]
extends = env:esp32s3_supermini
build_flags =
    ${env:esp32s3_supermini.build_flags}
    -DRELEASE_BUILD=1

[env:esp32s3_dev]
extends = env:esp32s3_supermini
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
build_flags =
    ${env:esp32s3_supermini.build_flags}
    -DDEV_BUILD=1
